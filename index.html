<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOODFUN TEAM ｜ 孤芳小隊</title>
    <script async src="//www.instagram.com/embed.js"></script>
    <style>
        :root { 
            --win-blue: #000080; 
            --win-red: #a80000;
            --win-gray: #C0C0C0; 
            --highlight-yellow: #ffff00; 
        }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background-color: #3d7a7b; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            overflow: hidden; 
            width: 100%;
        }

        .app-container { 
            display: flex; flex-direction: column; height: 100vh; 
            max-width: 1100px; margin: 0 auto; padding: 10px; box-sizing: border-box; 
            width: 100%; overflow: hidden;
        }
        
        .fixed-header { flex-shrink: 0; z-index: 10; width: 100%; }
        .top-bar { background: var(--win-gray); border: 3px outset #fff; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .logo-box { 
            display: flex; align-items: center; gap: 10px; font-weight: bold; 
            cursor: pointer; transition: opacity 0.2s;
        }
        .logo-box:hover { opacity: 0.8; }
        
        .logo-img { width: 30px; height: 30px; object-fit: contain; }
        .win-btn { background: var(--win-gray); border: 2px outset #fff; padding: 3px 12px; cursor: pointer; font-size: 0.85em; font-weight: bold; }

        .countdown-box { background: #000; color: #0f0; border: 2px inset #fff; padding: 8px; text-align: center; font-family: monospace; font-size: 0.85em; margin: 10px 0; }
        .marquee-zone { background: #000; color: var(--highlight-yellow); padding: 6px; border: 2px inset #fff; font-weight: bold; margin-bottom: 10px; height: 1.2em; overflow: hidden; }
        
        .scroll-window { 
            flex-grow: 1; background: #fff; border: 3px inset #fff; 
            overflow-y: auto; overflow-x: hidden; 
            padding: 20px; box-sizing: border-box; 
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        
        .section-label { background: var(--highlight-yellow); color: #000; padding: 5px 15px; font-weight: bold; border: 2px solid #000; margin: 25px 0 12px 0; display: inline-block; }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .item-card { background: #fff; border: 2px solid #000; cursor: pointer; box-shadow: 4px 4px 0px rgba(0,0,0,0.2); width: 100%; box-sizing: border-box; }
        .card-header { background: var(--win-blue); color: #fff; padding: 4px 10px; font-size: 0.75em; display: flex; justify-content: space-between; }
        .card-img-wrap { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-bottom: 2px solid #000; background: #eee; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { padding: 12px; font-weight: bold; text-align: center; font-size: 0.9em; }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); cursor: pointer; }
        .modal-content { background: var(--win-gray); border: 3px outset #fff; width: 100%; max-width: 1050px; height: 85vh; display: flex; flex-direction: column; position: relative; cursor: default; animation: winOpen 0.1s ease-out; overflow: hidden; }
        
        .modal-win-header { background: var(--win-blue); color: #fff; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .modal-close-btn { background: var(--win-gray); border: 2px outset #fff; color: #000; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; cursor: pointer; }

        .modal-body { display: flex; flex: 1; overflow: hidden; width: 100%; }
        .modal-left { flex: 1.4; background: #000; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .modal-left img { width: 100%; height: auto; }
        .modal-right { flex: 1; background: #fff; padding: 40px 30px; overflow-y: auto; border-left: 2px solid #000; display: flex; flex-direction: column; }
        .modal-title { font-size: 1.4em; font-weight: bold; color: var(--win-blue); border-bottom: 2px solid var(--win-blue); padding-bottom: 8px; margin-bottom: 20px; }
        .modal-desc { font-size: 0.95em; line-height: 1.8; color: #222; white-space: pre-line; }

        /* 浮動視窗堆疊 (右下角垂直排列) */
        .floating-stack {
            position: fixed; right: 25px; bottom: 30px; 
            display: flex; flex-direction: column; gap: 15px; z-index: 999;
        }

        .floating-widget {
            width: 90px; background: var(--win-gray); border: 3px outset #fff; 
            box-shadow: 6px 6px 0px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s;
        }
        .floating-widget:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,0.4); }
        .widget-header { color: white; font-size: 10px; padding: 2px 4px; text-align: center; font-weight: bold; }
        .header-blue { background: var(--win-blue); }
        .header-red { background: var(--win-red); }
        .widget-img-wrap { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; padding: 5px; box-sizing: border-box; background: #fff; }
        .widget-img-wrap img { width: 100%; height: 100%; object-fit: contain; } /* 改成 contain 讓蠟燭不被切掉 */

        .footer-content { background: var(--win-gray); border: 3px outset #fff; padding: 20px; margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; }
        .footer-title { background: var(--win-blue); color: white; padding: 4px 10px; font-size: 0.8em; font-weight: bold; margin-bottom: 12px; width: fit-content; }
        .member-zone { display: flex; gap: 15px; align-items: center; margin-bottom: 8px; }
        .member-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #000; object-fit: cover; background: #fff; transition: transform 0.2s; }
        .member-avatar:hover { transform: scale(1.1); }
        .copyright-bar { text-align: center; padding: 15px 0 5px 0; font-size: 0.7em; color: #666; width: 100%; grid-column: span 2; }
        
        .info-icon-btn { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; background: var(--win-gray); border: 2px outset #fff; 
            cursor: pointer; font-weight: bold; font-size: 18px;
        }

        @media (max-width: 800px) {
            .modal-content { height: 90vh; width: 95vw; }
            .modal-body { flex-direction: column; }
            .modal-left { flex: 0 0 45%; border-bottom: 2px solid #000; padding: 10px; }
            .modal-right { flex: 1; border-left: none; padding: 25px 20px; }
            .footer-content { grid-template-columns: 1fr; gap: 20px; }
            .floating-widget { width: 75px; }
            .floating-stack { right: 15px; bottom: 20px; }
        }

        .full-width .modal-right { display: none !important; }
        .full-width .modal-left { flex: 1; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="fixed-header">
            <div class="top-bar">
                <div class="logo-box" onclick="scrollToTop()">
                    <img src="logo.png" alt="LF" class="logo-img">
                    <span>● GOODFUN TEAM</span>
                </div>
                <div><button class="win-btn" onclick="toggleLang()">EN / 中文</button></div>
            </div>
            <div class="countdown-box" id="timer">TPABF COUNTDOWN...</div>
            <div class="marquee-zone"><marquee id="ui-marquee" scrollamount="5"></marquee></div>
        </div>
        <div class="scroll-window" id="gallery-container"></div>
    </div>

    <div class="floating-stack">
        <div class="floating-widget" onclick="window.open('https://goodfunteam.github.io/Lucky-Candle/', '_blank')">
            <div class="widget-header header-red">LUCKY.EXE</div>
            <div class="widget-img-wrap">
                <img src="candle_off.png" alt="Lucky Candle Game">
            </div>
        </div>
        <div class="floating-widget" onclick="window.open('https://goodfunteam.github.io/goodfun_grocery', '_blank')">
            <div class="widget-header header-blue">GROCERY.EXE</div>
            <div class="widget-img-wrap">
                <img src="grocery_icon.png" alt="Grocery Store">
            </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-win-header">
                <span id="win-filename" style="font-size: 11px;">PREVIEW.EXE</span>
                <div class="modal-close-btn" onclick="closeModal()">×</div>
            </div>
            <div class="modal-body">
                <div class="modal-left" id="modal-images-container"></div>
                <div class="modal-right">
                    <div id="modal-title" class="modal-title"></div>
                    <div id="modal-desc" class="modal-desc"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'zh';

        const data = {
            zh: {
                marquee: "攤位 L523 【2026】草率季TPABF十週年 3/6 - 3/8 @ 台北表演藝術中心(TPAC)與你相見！",
                sections: ["● 作品總覽 Works", "● 過往活動 Past Events"],
                footerContactTitle: "聯絡我們 CONTACT",
                footerAboutTitle: "關於 孤芳小隊 ABOUT",
                footerAboutDesc: "獨立藝術創作單位。關注日常環境中的結構、使用痕跡與暫停狀態。\n\n我們透過攝影、印刷物件與立體裝置，試圖捕捉那些在快速流動的城市中被遺忘的「微小連線」。\n\nEmail: goodfun.team@gmail.com",
                copyright: "© 2026 GOODFUN TEAM. ALL RIGHTS RESERVED.",
                sale: [
                    { title: "馬年賀卡", img: "horse_card.jpg", desc: "明信片／孔版印刷。以馬年為主題，先以黏土手作並上色完成角色原型，再進行拍攝與分色製版。\n畫面中，孤芳小隊的角色「鼠」與「雪貂」坐上賽馬造型的搖搖馬，隱喻在追逐目標的過程中，看似前進，卻可能仍停留原地。" },
                    { title: "空心 IN PLACE", img: "inplace.jpg", desc: "攝影折頁小誌 × 水泥物件。創作始於 2024 年底移居台北後，持續觀察街頭被反覆使用的空心磚。\n透過攝影與折頁小誌形式，想像每一塊磚都在其位置中履行任務。" },
                    { title: "Soft Drinks", img: "softdrinks.jpg", desc: "攝影 × 包裝設計。將 2023–2025 年間收集的酒罐影像轉化為絲巾圖像，並封裝於鋁罐中。唯有「開罐」才能取出絲巾，對應飲酒行為的不可逆性。" },
                    { title: "30時間 2nd Ed.", img: "30hours.jpg", desc: "攝影小誌 (A5)。以「30 小時制」為概念，透過實際行走與感受，用底片記錄新宿與涉谷的城市節奏。" },
                    { title: "Hand-it 手心貼", img: "handit.jpg", desc: "文具設計。靈感來自把重要事情寫在手上，卻難以洗掉的生活經驗。將「手心」轉化為可張貼的便利貼造型。" },
                    { title: "PastePort 貼紙簿", img: "pastebook.jpg", desc: "貼紙冊。以街頭貼紙文化為起點，收集台灣街頭可能出現的貼紙場景，整理成 ZINE。" },
                    { title: "PASSTER 貼紙組", img: "passter.jpg", desc: "貼紙。將街頭物件與標語轉化為可自由張貼的貼紙。使用者在城市中經過、停留並貼上，成為留下痕跡的「PASSTER」。" },
                    { title: "燭籤 Lucky Candle", img: "candle.jpg", desc: "樹脂、紙張。以台灣經典生日「問號蠟燭」為靈感，設計成幸運小物。象徵「最後一個願望，留給自己」。" },
                    { title: "PIPO君 張子", img: "pipo.jpg", desc: "立體角色張子。以張子形式重製東京警視廳吉祥物「ピーポくん」，透過手作轉譯，將公共角色轉化為個人收藏物件。" },
                    { title: "孤芳收音機", img: "radio.jpg", desc: "立體裝置。以聲音作為「訊號」與「連線」的隱喻，描繪角色在城市噪音中彼此接收與回應的狀態。" }
                ],
                events: [
                    { title: "2025 草率季現場紀錄", cover: "event_cover_01.jpg", useIg: true, desc: "" }
                ]
            },
            en: {
                marquee: "Booth no.L523 [2026] Taipei Art Book Fair @ TPAC, Mar 6-8!",
                sections: ["● Works", "● Past Events"],
                footerContactTitle: "CONTACT",
                footerAboutTitle: "ABOUT US",
                footerAboutDesc: "Independent art unit focusing on urban structures and daily life traces.",
                copyright: "© 2026 GOODFUN TEAM. ALL RIGHTS RESERVED.",
                sale: [
                    { title: "Year of Horse Card", img: "horse_card.jpg", desc: "Postcard / Risograph. Characters ride rocking horses as a metaphor for moving while staying in place." },
                    { title: "IN PLACE", img: "inplace.jpg", desc: "Photography fold-out zine with concrete object, observing hollow bricks in the streets of Taipei." },
                    { title: "Soft Drinks", img: "softdrinks.jpg", desc: "Scarves featuring beer can imagery, packaged in aluminum cans that must be 'opened' to access." },
                    { title: "30 Hours 2nd Ed.", img: "30hours.jpg", desc: "A photography zine documenting the rhythms of Shinjuku and Shibuya through a 30-hour temporal lens." },
                    { title: "Hand-it", img: "handit.jpg", desc: "Sticky notes that transform the palm into a writable surface." },
                    { title: "PastePort", img: "pastebook.jpg", desc: "A sticker book recording street scenes in Taiwan." },
                    { title: "PASSTER", img: "passter.jpg", desc: "A sticker set derived from PASTE BOOK, allowing users to leave their own traces." },
                    { title: "Lucky Candle", img: "candle.jpg", desc: "A lucky object inspired by classic birthday candles." },
                    { title: "PIPO-KUN Papier-mâché", img: "pipo.jpg", desc: "A hand-crafted papier-mâché reinterpretation of 'Pipo-kun'." },
                    { title: "GOODFUN Radio", img: "radio.jpg", desc: "An installation using sound as a metaphor for signal and connection." }
                ],
                events: [
                    { title: "2025 Archive", cover: "event_cover_01.jpg", useIg: true, desc: "" }
                ]
            }
        };

        const igCode = `<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DSCwMTHD34O/" data-instgrm-version="14"></blockquote>`;

        function render() {
            const container = document.getElementById('gallery-container');
            if (!container) return;
            container.innerHTML = "";
            const l = data[currentLang];
            document.getElementById('ui-marquee').innerText = l.marquee;

            const order = ['sale', 'events'];
            order.forEach((cat, idx) => {
                const label = document.createElement('div'); label.className = 'section-label'; label.innerText = l.sections[idx] || "Untitled";
                container.appendChild(label);
                const grid = document.createElement('div'); grid.className = 'main-grid';
                if (l[cat]) {
                    l[cat].forEach((item, i) => {
                        const card = document.createElement('div'); card.className = 'item-card';
                        card.onclick = () => openModal(item);
                        card.innerHTML = `<div class="card-header">FILE: 00${i+1} <span>[X]</span></div><div class="card-img-wrap"><img src="${item.cover || item.img}"></div><div class="card-title">${item.title}</div>`;
                        grid.appendChild(card);
                    });
                }
                container.appendChild(grid);
            });

            const footer = document.createElement('div');
            footer.className = 'footer-content';
            footer.innerHTML = `
                <div>
                    <div class="footer-title">${l.footerContactTitle}</div>
                    <div class="member-zone">
                        <a href="https://www.instagram.com/rotion87" target="_blank" title="Rotion's IG">
                            <img src="avatar_rotion.jpg" class="member-avatar" style="cursor:pointer; border: 2px solid var(--win-blue);">
                        </a>
                        <a href="https://www.instagram.com/l72uo_" target="_blank" title="423's IG">
                            <img src="avatar_423.jpg" class="member-avatar" style="cursor:pointer; border: 2px solid var(--win-blue);">
                        </a>
                        <button class="info-icon-btn" onclick="openAbout()">i</button>
                    </div>
                    <p style="font-size:0.75em; margin-top:8px;">
                        <a href="https://www.instagram.com/goodfun.team" target="_blank" style="color:var(--win-blue); font-weight:bold; text-decoration:underline;">
                            IG: @goodfun.team
                        </a>
                    </p>
                </div>
                <div style="text-align:right;">
                    <div class="footer-title">${l.footerAboutTitle}</div>
                    <p style="font-size:0.7em; color:#444;">Click avatars for IG<br>點擊 Logo 回到頂端</p>
                </div>
                <div class="copyright-bar">${l.copyright}</div>`;
            container.appendChild(footer);
        }

        function scrollToTop() {
            const container = document.getElementById('gallery-container');
            if (container) {
                container.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function openAbout() {
            const l = data[currentLang];
            openModal({ title: l.footerAboutTitle, desc: l.footerAboutDesc, img: "logo.png" });
        }

        function openModal(item) {
            const modalWrap = document.getElementById('modal-content');
            const c = document.getElementById('modal-images-container');
            document.getElementById('win-filename').innerText = item.title.toUpperCase() + ".EXE";
            c.innerHTML = ""; c.scrollTop = 0;
            if (item.useIg) {
                modalWrap.classList.add('full-width');
                c.innerHTML = igCode;
                setTimeout(() => { if (window.instgrm) window.instgrm.Embeds.process(); }, 100);
            } else {
                modalWrap.classList.remove('full-width');
                if (item.img) {
                    const img = document.createElement('img'); img.src = item.img;
                    c.appendChild(img);
                }
                document.getElementById('modal-title').innerText = item.title;
                document.getElementById('modal-desc').innerText = item.desc;
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        function toggleLang() { 
            currentLang = currentLang === 'zh' ? 'en' : 'zh'; 
            render(); 
        }

        function updateTimer() {
            const target = new Date("March 6, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const timerEl = document.getElementById('timer');

            if (diff <= 0) {
                timerEl.innerText = "TPABF 10TH ANNIVERSARY: HAPPENING NOW!";
            } else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                timerEl.innerText = `TPAC COUNTDOWN: ${days} DAYS LEFT`;
            }
        }

        window.onload = () => {
            render(); 
            updateTimer(); 
            setInterval(updateTimer, 60000);
        };
    </script>
</body>
</html>
